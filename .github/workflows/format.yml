name: Verify formatting

on:
  push:
    branches: main
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    name: Verify Python formatting
    steps:
    - uses: actions/checkout@v7

    - uses: astral-sh/ruff-action@v3
      with:
        version: "0.14.13"
        args: "format --check"

  djlint:
    runs-on: ubuntu-latest
    name: Check HTML formatting
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6

    - name: Install dependencies
      run: |
        pip install -U pip
        pip install "djlint==1.39.0"

    - name: Format HTML
      run: |
        djlint --version
        djlint . --check --configuration pyproject.toml
