<div class="card card-base my-4" id="timeslot-{{ timeslot.pk }}">
  <details class="group collapse collapse-arrow"
           name="timeslot-accordion"
           hx-get="{% url 'htmx:timeslot-update' pk=timeslot.pk %}"
           hx-trigger="toggle[this.open]"
           hx-target="#timeslot-form-{{ timeslot.pk }}"
           hx-swap="innerHTML">
    <summary class="collapse-title min-h-0 p-3 pr-12">
      <div class="group-open:hidden flex flex-col gap-1 min-w-0">
        <h2 class="text-lg font-semibold">{{ timeslot.name }}</h2>
        <div class="flex flex-wrap gap-1">
          {% for tr in timeslot.time_recurrences.all %}
            <span class="badge badge-sm">{{ tr.short_str }}</span>
          {% empty %}
            <span class="text-sm italic text-base-content/60">No time recurrences</span>
          {% endfor %}
        </div>
      </div>
    </summary>
    <div class="collapse-content" id="timeslot-form-{{ timeslot.pk }}">
      <span class="loading loading-spinner loading-md"></span>
    </div>
  </details>
  {% include timeslot.delete_modal.template_name with modal=timeslot.delete_modal %}
</div>
