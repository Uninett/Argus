<dialog id="filter-delete-dialog" class="modal">
  <div class="modal-box card card-compact shadow-xl">
    <div class="w-full">
      <div class="divider divider-start">
        <h3 class="card-title">Delete filter</h3>
      </div>
      <p class="antialiased text-base font-normal">
        Are you sure you want to delete <em id="filter-delete-name" class="font-semibold"></em>?
      </p>
      <div class="modal-action card-actions">
        <form method="dialog" class="w-full">
          {% csrf_token %}
          <div class="divider divider-end">
            <button id="filter-delete-confirm" class="btn btn-primary" type="button">Yes</button>
            <button class="btn" type="submit">No</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>
